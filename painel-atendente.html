<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel do Atendente — Maria</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--gd:#0B4D2E;--gm:#1A8F50;--gl:#C8EDD8;--gp:#EDF7F1;--r:#C0392B;--rl:#FDECEA;--g100:#F5F6F8;--g200:#E8EAED;--g400:#9AA0AB;--wh:#FFFFFF;--tx:#1A1E26;--rad:18px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#0f1923;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}

  .container{width:100%;max-width:500px;height:96vh;max-height:780px;background:var(--wh);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;}

  .hdr{background:var(--gd);padding:15px 18px;display:flex;align-items:center;gap:11px;flex-shrink:0;}
  .avt{width:40px;height:40px;border-radius:50%;background:var(--gm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .hdr-info{flex:1;}
  .hdr-name{font-size:15px;font-weight:600;color:var(--wh);}
  .hdr-sub{font-size:10.5px;color:var(--gl);opacity:.85;margin-top:2px;}
  .status{font-size:10.5px;padding:3px 10px;border-radius:20px;font-weight:500;}
  .status.ag{background:rgba(255,200,0,.2);color:#FFD700;}
  .status.ok{background:rgba(46,204,113,.2);color:#2ECC71;}
  .status.off{background:rgba(255,255,255,.1);color:#aaa;}

  /* Lista de sessões */
  .sessoes-bar{background:var(--gp);border-bottom:1px solid var(--gl);padding:8px 14px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;}
  .sessoes-bar::-webkit-scrollbar{height:3px;}.sessoes-bar::-webkit-scrollbar-thumb{background:var(--gl);border-radius:3px;}
  .sess-btn{font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:500;padding:5px 12px;border:1.5px solid var(--gm);border-radius:20px;background:transparent;color:var(--gm);cursor:pointer;white-space:nowrap;transition:all .15s;position:relative;}
  .sess-btn.active{background:var(--gm);color:var(--wh);}
  .sess-btn .nv{position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:var(--r);color:var(--wh);font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--wh);}

  .notice{background:var(--gp);border-bottom:1px solid var(--gl);padding:7px 16px;font-size:11px;color:var(--gd);display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .ndot{width:7px;height:7px;border-radius:50%;background:#2ECC71;flex-shrink:0;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .msgs{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:9px;background:var(--g100);scroll-behavior:smooth;}
  .msgs::-webkit-scrollbar{width:3px;}.msgs::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}

  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--g400);font-size:13px;gap:8px;}
  .empty span{font-size:36px;}

  .amsg{display:flex;flex-direction:column;max-width:82%;animation:fu .22s ease forwards;}
  @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .amsg.prod{align-self:flex-start;}
  .amsg.aten{align-self:flex-end;}
  .amsg.sistema{align-self:center;max-width:90%;}
  .amsg.auto{align-self:flex-start;}

  .lbl{font-size:9.5px;color:var(--g400);margin-bottom:2px;padding:0 3px;}
  .aten .lbl{text-align:right;}
  .sistema .lbl{text-align:center;}

  .bbl{padding:9px 13px;font-size:13px;line-height:1.55;border-radius:var(--rad);}
  .prod .bbl{background:var(--wh);color:var(--tx);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .aten .bbl{background:var(--gm);color:var(--wh);border-bottom-right-radius:4px;}
  .sistema .bbl{background:#e8f5e9;color:var(--gd);border-radius:10px;font-size:12px;text-align:center;border:1px solid var(--gl);}
  .auto .bbl{background:#f0f4ff;color:#2c3e7a;border-bottom-left-radius:4px;border:1px solid #d0d8f5;}

  .tag{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:10px;font-weight:600;margin-bottom:3px;}
  .tag.prod{background:#fff3cd;color:#856404;}
  .tag.auto{background:#d4f0e8;color:#0B4D2E;}

  .atime{font-size:9.5px;color:var(--g400);margin-top:2px;padding:0 3px;}
  .aten .atime{text-align:right;}
  .sistema .atime{text-align:center;}

  .inp{padding:10px 14px 12px;border-top:1px solid var(--g200);background:var(--wh);display:flex;gap:7px;align-items:flex-end;flex-shrink:0;}
  .inp textarea{flex:1;font-family:'DM Sans',sans-serif;font-size:13px;border:1.5px solid var(--g200);border-radius:14px;padding:9px 13px;background:var(--g100);color:var(--tx);outline:none;resize:none;min-height:40px;max-height:90px;transition:border-color .15s;line-height:1.4;}
  .inp textarea:focus{border-color:var(--gm);background:var(--wh);}
  .inp textarea::placeholder{color:var(--g400);}
  .sbtn{width:38px;height:38px;border-radius:50%;background:var(--gm);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;}
  .sbtn:hover{background:var(--gd);}.sbtn:active{transform:scale(.93);}
  .sbtn svg{width:15px;height:15px;fill:white;}

  .foot{background:#f0f7f3;border-top:1px solid var(--g200);padding:6px 14px;text-align:center;font-size:10px;color:var(--g400);flex-shrink:0;}
  .foot strong{color:var(--gd);font-weight:600;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--gd);color:white;padding:9px 18px;border-radius:30px;font-size:12.5px;font-weight:500;transition:transform .28s ease;z-index:999;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  .icard{background:var(--gp);border:1px solid var(--gl);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--gd);line-height:1.5;}
  .icard strong{font-weight:600;display:block;margin-bottom:3px;}
  .ucard{background:var(--rl);border:1px solid #F5C6C2;border-radius:10px;padding:10px 13px;font-size:12px;color:#7B1D15;line-height:1.5;}
  .ucard strong{font-weight:600;display:block;margin-bottom:3px;}
  .ucard .samu{font-size:18px;font-weight:600;color:var(--r);letter-spacing:1px;}
</style>
</head>
<body>
<div class="container">
  <div class="hdr">
    <div class="avt">👤</div>
    <div class="hdr-info">
      <div class="hdr-name">Painel do Atendente</div>
      <div class="hdr-sub">Hospital Municipal de Montes Claros de Goiás</div>
    </div>
    <div class="status off" id="status">Aguardando</div>
  </div>

  <div class="sessoes-bar" id="sessoes-bar">
    <span style="font-size:11px;color:var(--g400);align-self:center;">Aguardando produtores...</span>
  </div>

  <div class="notice">
    <div class="ndot"></div>
    Mensagens chegam em tempo real via Firebase
  </div>

  <div class="msgs" id="msgs">
    <div class="empty" id="empty">
      <span>💬</span>
      <div>Nenhuma mensagem ainda</div>
      <div style="font-size:11px;text-align:center">Aguardando o produtor entrar em contato</div>
    </div>
  </div>

  <div class="inp">
    <textarea id="ai" placeholder="Digite sua resposta ao produtor..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();aSend()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="sbtn" onclick="aSend()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="foot">Desenvolvido pelo <strong>FAEG Jovem</strong> de Montes Claros de Goiás</div>
</div>
<div class="toast" id="toast"></div>

<script>
const DB = 'https://assistente-vitural-mcg-default-rtdb.firebaseio.com';
let sessaoAtiva = null;
let sessoes = {}; // { sessaoId: { nome, msgs:[], novas:0 } }
let ultimoTs = 0;

function gt(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function removeEmpty(){const e=document.getElementById('empty');if(e)e.remove();}

function renderSessoes(){
  const bar = document.getElementById('sessoes-bar');
  const ids = Object.keys(sessoes);
  if(!ids.length){
    bar.innerHTML='<span style="font-size:11px;color:var(--g400);align-self:center;">Aguardando produtores...</span>';
    return;
  }
  bar.innerHTML='';
  ids.forEach(id=>{
    const s=sessoes[id];
    const btn=document.createElement('button');
    btn.className='sess-btn'+(sessaoAtiva===id?' active':'');
    btn.textContent=s.nome||'Produtor';
    if(s.novas>0){
      const nv=document.createElement('span');
      nv.className='nv';nv.textContent=s.novas;
      btn.appendChild(nv);
    }
    btn.onclick=()=>selecionarSessao(id);
    bar.appendChild(btn);
  });
}

function selecionarSessao(id){
  sessaoAtiva=id;
  if(sessoes[id]) sessoes[id].novas=0;
  renderSessoes();
  renderMsgs();
  document.getElementById('status').className='status ag';
  document.getElementById('status').textContent='Produtor Online';
}

function renderMsgs(){
  if(!sessaoAtiva||!sessoes[sessaoAtiva]) return;
  const c=document.getElementById('msgs');
  c.innerHTML='';
  sessoes[sessaoAtiva].msgs.forEach(m=>appendMsg(m,false));
}

function appendMsg(m, scroll=true){
  removeEmpty();
  const c=document.getElementById('msgs');
  const d=document.createElement('div');
  const isProd = m.de!=='Maria (auto)'&&m.de!=='sistema'&&m.de!=='atendente';
  const isSistema = m.de==='sistema';
  const isAuto = m.de==='Maria (auto)';
  const isAten = m.de==='atendente';

  if(isSistema){
    d.className='amsg sistema';
    d.innerHTML=`<div class="bbl">${m.texto}</div><div class="atime">${m.hora}</div>`;
  } else if(isAten){
    d.className='amsg aten';
    d.innerHTML=`<div class="lbl">👤 Você (Atendente)</div><div class="bbl">${m.texto}</div><div class="atime">${m.hora}</div>`;
  } else if(isAuto){
    d.className='amsg auto';
    const tag=`<div class="tag auto">🤖 Maria (automático)</div>`;
    d.innerHTML=`<div class="lbl">Maria</div><div class="bbl">${tag}${m.isHtml?m.texto:`<span>${m.texto}</span>`}</div><div class="atime">${m.hora}</div>`;
  } else {
    d.className='amsg prod';
    const tag=`<div class="tag prod">🌾 ${m.de}</div>`;
    d.innerHTML=`<div class="lbl">${m.de}</div><div class="bbl">${tag}${m.isHtml?m.texto:`<span>${m.texto}</span>`}</div><div class="atime">${m.hora}</div>`;
  }
  c.appendChild(d);
  if(scroll) c.scrollTop=c.scrollHeight;
}

// Polling Firebase a cada 2s
async function pollMensagens(){
  try{
    const r=await fetch(`${DB}/mensagens.json?orderBy="ts"&startAt=${ultimoTs+1}&limitToLast=20`);
    const data=await r.json();
    if(data){
      Object.values(data).sort((a,b)=>a.ts-b.ts).forEach(m=>{
        if(m.ts>ultimoTs) ultimoTs=m.ts;
        const sid=m.sessao;
        if(!sessoes[sid]) sessoes[sid]={nome:m.nome||'Produtor',msgs:[],novas:0};
        if(m.de==='sistema') sessoes[sid].nome=m.nome||'Produtor';
        sessoes[sid].msgs.push(m);
        if(sessaoAtiva===sid){
          appendMsg(m);
        } else {
          sessoes[sid].novas++;
          if(m.de!=='Maria (auto)') showToast('💬 Nova msg de '+(m.nome||'Produtor'));
        }
        renderSessoes();
      });
    }
  } catch(e){}
  setTimeout(pollMensagens,2000);
}
pollMensagens();

async function aSend(){
  const ai=document.getElementById('ai');
  const txt=ai.value.trim();if(!txt||!sessaoAtiva)return;
  const hora=gt();
  const m={de:'atendente',texto:txt,isHtml:false,hora,sessao:sessaoAtiva,ts:Date.now()};

  // Salva no Firebase
  await fetch(`${DB}/mensagens.json`,{method:'POST',body:JSON.stringify(m)});
  // Salva resposta para o produtor ouvir
  await fetch(`${DB}/respostas/${sessaoAtiva}.json`,{method:'PUT',body:JSON.stringify({texto:txt,ts:Date.now()})});

  ai.value='';ai.style.height='auto';
  document.getElementById('status').className='status ok';
  document.getElementById('status').textContent='Respondido';
  showToast('✅ Resposta enviada!');
}
</script>
</body>
</html>
